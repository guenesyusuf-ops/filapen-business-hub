[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["npm install"]
cacheDirectories = []

[phases.build]
cmds = [
  "npx prisma generate --schema=packages/database/prisma/schema.prisma",
  "rm -rf apps/api/dist",
  "cd apps/api && npx nest build",
  "echo 'Build complete: ' && ls -la apps/api/dist/main.js || echo 'ERROR: dist/main.js not found!'"
]

[start]
cmd = "node apps/api/dist/main.js"
